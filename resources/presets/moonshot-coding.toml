[provider]
builtinId = "moonshot-coding"
name = { en = "Kimi Coding Plan", zh = "Kimi（套餐）" }
type = "openai-chat"
defaultBaseUrl = "https://api.kimi.com/coding/v1"
homepage = "https://www.kimi.com"
defaultEnabled = false
requiresApiKey = true
authMode = "apiKey"
userAgent = "KimiCLI/1.30.0"

[[provider.defaultModels]]
id = "kimi-for-coding"
name = "Kimi for Coding"
contextLength = 262144
maxOutputTokens = 32768
supportsThinking = true

[provider.defaultModels.thinkingConfig]
forceTemperature = 1.0
[provider.defaultModels.thinkingConfig.bodyParams.thinking]
type = "enabled"
[provider.defaultModels.thinkingConfig.disabledBodyParams.thinking]
type = "disabled"
