[provider]
builtinId = "bigmodel"
name = { en = "Zhipu", zh = "智谱" }
type = "openai-chat"
defaultBaseUrl = "https://open.bigmodel.cn/api/paas/v4"
homepage = "https://bigmodel.cn"
defaultModel = "glm-5.2"

# ═══════════════════════════════════════════════════════════════
# GLM-5.2 (June 2026, flagship, MIT license)
# 744B MoE, ~40B active, 1M context, 128K max output
# Code Arena #1 open-source, FrontierSWE 74.4
# Reasoning effort: high | max (default max)
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "glm-5.2"
name = "GLM-5.2"
contextLength = 1000000
maxOutputTokens = 128000
supportsThinking = true
[provider.defaultModels.thinkingConfig]
reasoningEffortLevels = ["high", "max"]
defaultReasoningEffort = "max"
[provider.defaultModels.thinkingConfig.bodyParams.thinking]
type = "enabled"
[provider.defaultModels.thinkingConfig.disabledBodyParams.thinking]
type = "disabled"

