<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Flint</title>
    <link rel="icon" href="/icons/favicon.ico" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://cdn.bootcdn.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https: http://localhost:* http://127.0.0.1:* http://ipc.localhost; frame-src 'self' http://localhost:* http://127.0.0.1:*"
    />
  </head>

  <body>
    <style>
      @keyframes splash-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes splash-icon-enter {
        0% { opacity: 0; transform: scale(0.85); }
        100% { opacity: 1; transform: scale(1); }
      }
      #pre-react-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: hsl(0 0% 5.5%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.35s ease-in-out;
      }
      #pre-react-splash .splash-icon {
        width: 88px; height: 88px;
      }
      #pre-react-splash .splash-text {
        font-size: 2rem; font-weight: 600; color: hsl(0 0% 98%);
        letter-spacing: 0.025em; user-select: none;
        background: linear-gradient(90deg, hsl(0 0% 32%) 0%, hsl(0 0% 40%) 20%, hsl(0 0% 98%) 40%, hsl(0 0% 98%) 60%, hsl(0 0% 40%) 80%, hsl(0 0% 32%) 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: splash-shimmer 2.4s ease-in-out infinite;
      }
    </style>
    <div id="pre-react-splash">
      <img class="splash-icon" src="/icons/icon.png" alt="Flint" />
      <span class="splash-text">Flint</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
