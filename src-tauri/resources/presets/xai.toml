[provider]
builtinId = "xai"
name = { en = "xAI", zh = "xAI" }
type = "openai-chat"
defaultBaseUrl = "https://api.x.ai/v1"
homepage = "https://x.ai"

# ═══════════════════════════════════════════════════════════════
# Grok 4.3 (May 2026, current flagship)
# Reasoning effort levels: none | low | medium | high
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "grok-4.3"
name = "Grok 4.3"
contextLength = 1000000
maxOutputTokens = 128000
supportsThinking = true

[provider.defaultModels.thinkingConfig]
reasoningEffortLevels = ["none", "low", "medium", "high"]
defaultReasoningEffort = "medium"

# ═══════════════════════════════════════════════════════════════
# Grok 4.20 Series (March 2026, superseded by 4.3)
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "grok-4.20-multi-agent-0309"
name = "Grok 4.20 Multi-Agent"
contextLength = 2000000
maxOutputTokens = 128000
supportsThinking = true

[provider.defaultModels.thinkingConfig]
reasoningEffortLevels = ["low", "medium", "high", "xhigh"]
defaultReasoningEffort = "medium"

[[provider.defaultModels]]
id = "grok-4.20-0309-reasoning"
name = "Grok 4.20 Reasoning"
contextLength = 1000000
maxOutputTokens = 128000
supportsThinking = true

[provider.defaultModels.thinkingConfig]
reasoningEffortLevels = ["low", "medium", "high", "xhigh"]
defaultReasoningEffort = "high"
