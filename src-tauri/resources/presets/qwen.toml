[provider]
builtinId = "qwen"
name = { en = "Qwen", zh = "通义千问" }
type = "openai-chat"
defaultBaseUrl = "https://dashscope.aliyuncs.com/compatible-mode/v1"
homepage = "https://dashscope.aliyun.com"

# ═══════════════════════════════════════════════════════════════
# Qwen3.7 Series (May 2026, closed-weight API-only)
# Thinking: enable_thinking (bool) + thinking_budget (int, optional)
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "qwen3.7-max"
name = "Qwen3.7 Max"
contextLength = 1000000
maxOutputTokens = 65536
supportsThinking = true
[provider.defaultModels.thinkingConfig]
[provider.defaultModels.thinkingConfig.bodyParams]
enable_thinking = true
thinking_budget = 2048

