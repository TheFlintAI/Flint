[provider]
builtinId = "minimax"
name = { en = "MiniMax", zh = "MiniMax" }
type = "anthropic"
defaultBaseUrl = "https://api.minimaxi.com/anthropic"
homepage = "https://www.minimaxi.com"
defaultModel = "MiniMax-M3"

# ═══════════════════════════════════════════════════════════════
# MiniMax M3 (June 2026, flagship)
# 1M context (512K guaranteed), MSA sparse attention
# Multimodal: text + image + video
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "MiniMax-M3"
name = "MiniMax M3"
contextLength = 1000000
maxOutputTokens = 131072
supportsVision = true

# ═══════════════════════════════════════════════════════════════
# MiniMax M2.7 (March 2026)
# 230B MoE, 10B active, text-only
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "MiniMax-M2.7"
name = "MiniMax M2.7"
contextLength = 204800
maxOutputTokens = 131072

[[provider.defaultModels]]
id = "MiniMax-M2.7-highspeed"
name = "MiniMax M2.7 Highspeed"
contextLength = 204800
maxOutputTokens = 131072

