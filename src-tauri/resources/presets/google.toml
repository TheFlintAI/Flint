[provider]
builtinId = "google"
name = { en = "Google Gemini", zh = "Google Gemini" }
type = "gemini"
defaultBaseUrl = "https://generativelanguage.googleapis.com/v1beta"
homepage = "https://ai.google.dev"

# ═══════════════════════════════════════════════════════════════
# Gemini 3.5 Series (May-June 2026)
# Uses reasoning_effort levels: low | medium | high
# Note: gemini-3.5-pro does not exist in Google's API yet (only gemini-3.5-flash is available)
# ═══════════════════════════════════════════════════════════════

[[provider.defaultModels]]
id = "gemini-3.5-flash"
name = "Gemini 3.5 Flash"
contextLength = 1048576
maxOutputTokens = 65536
supportsThinking = true

[provider.defaultModels.thinkingConfig]
reasoningEffortLevels = ["low", "medium", "high"]
defaultReasoningEffort = "medium"

