[provider]
builtinId = "anthropic"
name = { en = "Anthropic", zh = "Anthropic" }
type = "anthropic"
defaultBaseUrl = "https://api.anthropic.com"
homepage = "https://anthropic.com"
supportsStrictSchemas = true

# ═══════════════════════════════════════════════════════════════
# Adaptive Thinking (current-gen: Opus 4.6+, Sonnet 4.6+)
# Effort levels: low | medium | high | xhigh | max
# ═══════════════════════════════════════════════════════════════

# ── Claude Fable 5 (June 2026, suspended under US export controls) ──

[[provider.defaultModels]]
id = "claude-fable-5"
name = "Claude Fable 5"
contextLength = 1000000
maxOutputTokens = 128000
supportsThinking = true

[provider.defaultModels.thinkingConfig]
forceTemperature = 1.0
defaultReasoningEffort = "high"
reasoningEffortLevels = ["low", "medium", "high", "xhigh", "max"]

[provider.defaultModels.thinkingConfig.bodyParams.thinking]
type = "adaptive"

